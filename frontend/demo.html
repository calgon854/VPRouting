      style: {
        color: "#1d6fa4",      // matches your --accent
        weight: 1.5,
        fillOpacity: 0,
        opacity: 0.8
      }
    }).addTo(map);
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OSM</a> · © <a href="https://carto.com/" target="_blank">CARTO</a> · MeteoSwiss ICON-CH1-EPS',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

// ── Switzerland grey mask + border ───────────────────────────
fetch('./ch.geojson')
  .then(r => r.json())
  .then(ch => {
    const coords = ch.geometry.coordinates[0];

    // Grey wash outside Switzerland
    L.geoJSON({
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [
          [[-180,-90],[180,-90],[180,90],[-180,90],[-180,-90]], // world
          coords.slice().reverse()                               // CH hole
        ]
      }
    }, {
      style: { fillColor: '#8a96a8', fillOpacity: 0.35, stroke: false },
      interactive: false
    }).addTo(map);

    // Blue border on CH
    L.geoJSON(ch, {
      style: { color: '#1d6fa4', weight: 1.8, fillOpacity: 0, opacity: 0.9 },
      interactive: false
    }).addTo(map);
  })
  .catch(e => console.warn('ch.geojson not loaded:', e));

  // Rain overlay — single ImageOverlay swapped on each frame step
  const overlay = L.imageOverlay(FRAMES[0], BOUNDS, {
    opacity: 0.75,
    interactive: false,
  }).addTo(map);

  // Click on map: show nearest point rainfall tooltip (basic lat/lon echo)
  map.on('click', (e) => {
    const { lat, lng } = e.latlng;
    L.popup()
      .setLatLng(e.latlng)
      .setContent(
        `<strong>${LABELS[currentFrame]}</strong><br/>` +
        `Lat ${lat.toFixed(3)}° · Lon ${lng.toFixed(3)}°`
      )
      .openOn(map);
  });

  // Hide loading overlay once map tiles have loaded
  map.once('load', hideLoading);
  setTimeout(hideLoading, 1200); // fallback

  function hideLoading() {
    loading.classList.add('hidden');
    setTimeout(() => loading.remove(), 400);
  }

  // ── Frame rendering ────────────────────────────────────────────────────────
  function showFrame(idx) {
    currentFrame = idx;
    overlay.setUrl(FRAMES[idx]);

    const label = LABELS[idx]; // e.g. "+05h · Sun 06 Apr 11:00 UTC"
    const parts = label.split(' · ');
    leadLbl.textContent  = parts[0] || label;
    validLbl.textContent = parts[1] || '';

    slider.value = idx;
    const pct = FRAMES.length > 1 ? (idx / (FRAMES.length - 1) * 100).toFixed(1) : 0;
    slider.style.setProperty('--pct', pct + '%');

    frameCount.textContent = `${idx + 1} / ${FRAMES.length}`;
    updateIntensityBadge(idx);
  }

  // ── Intensity badge ────────────────────────────────────────────────────────
  // We can't query pixel values without canvas; use frame index as proxy
  // for the label — replace with real per-point data if available via query.py
  function updateIntensityBadge(idx) {
    // Derive approximate "domain max at this frame" from the label (no pixel access)
    // This is a display-only hint; remove or replace if per-frame max is injected.
    const pct = idx / (FRAMES.length - 1);
    intensityBadge.className = '';
    intensityBadge.classList.add(
      pct < 0.1 ? 'dry' : pct < 0.4 ? 'light' : pct < 0.7 ? 'mod' : 'heavy'
    );
    intensityTxt.textContent =
      pct < 0.1 ? 'No rain' : pct < 0.4 ? 'Light rain' : pct < 0.7 ? 'Moderate' : 'Heavy rain';
  }

  // ── Playback ───────────────────────────────────────────────────────────────
  function step() {
    const next = (currentFrame + 1) % FRAMES.length;
    showFrame(next);
    if (next === 0) stopPlay(); // pause after one full loop
  }

  function startPlay() {
    playing = true;
    iconPlay.style.display  = 'none';
    iconPause.style.display = '';
    btnPlay.setAttribute('aria-label', 'Pause');
    timer = setInterval(step, intervalMs);
  }

  function stopPlay() {
    playing = false;
    iconPlay.style.display  = '';
    iconPause.style.display = 'none';
    btnPlay.setAttribute('aria-label', 'Play');
    clearInterval(timer);
  }

  btnPlay.addEventListener('click', () => playing ? stopPlay() : startPlay());
  btnPrev.addEventListener('click', () => { stopPlay(); showFrame((currentFrame - 1 + FRAMES.length) % FRAMES.length); });
  btnNext.addEventListener('click', () => { stopPlay(); showFrame((currentFrame + 1) % FRAMES.length); });

  slider.addEventListener('input', () => {
    stopPlay();
    showFrame(parseInt(slider.value, 10));
  });

  speedSel.addEventListener('change', () => {
    intervalMs = parseInt(speedSel.value, 10);
    if (playing) { stopPlay(); startPlay(); }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.code === 'Space')       { e.preventDefault(); btnPlay.click(); }
    if (e.code === 'ArrowRight')  { e.preventDefault(); btnNext.click(); }
    if (e.code === 'ArrowLeft')   { e.preventDefault(); btnPrev.click(); }
  });

  // Initial render
  showFrame(0);
});
</script>
</body>
</html>
