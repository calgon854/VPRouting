<style>

    height:12px; border-radius:4px; margin-bottom:4px;
    background:linear-gradient(to right,#ffffb2,#fed976,#feb24c,#fd8d3c,#f03b20,#bd0026);
  }

  #run-info { font-size:10px; color:#555; margin-top:6px; }
</style>
